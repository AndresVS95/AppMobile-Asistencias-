spring.application.name=asistencia
# ===============================
# CONFIGURACION DE BASE DE DATOS (MySQL)
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/asistencia_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Agrega esta línea para que Spring Boot respete las tablas que importaste de tu .sql
spring.jpa.hibernate.ddl-auto=update

# ===============================
# CONFIGURACION DE JPA / HIBERNATE
# ===============================
# 'update' le dice a Spring que cree o actualice las tablas de la BD automaticamente segun tus clases Java
# spring.jpa.hibernate.ddl-auto=update

# 'true' te permite ver en la consola las consultas SQL que Spring esto ejecutando (muy util para aprender y debugear)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8080